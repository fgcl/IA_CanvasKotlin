<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Lab | Kotlin Canvas Debugger</title>
    <link rel="stylesheet" href="lab.css">
    <!-- Removed base.css to prevent conflicts in Lab environment -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="dark-theme lab-body">
    <nav class="lab-sidebar glass">
        <div class="lab-logo">
            <div class="icon">🧪</div>
            <div class="logo-text">
                <h1>The Lab</h1>
                <span class="version">v2.0 (Solid Debugging)</span>
            </div>
        </div>
        
        <div class="lab-nav-section">
            <h3>Test Suites</h3>
            <ul id="test-suites-list" class="lab-nav-items">
                <!-- Injected via LabManager.js -->
            </ul>
        </div>

        <div class="lab-nav-section border-top">
            <h3>Diagnostic Overlays</h3>
            <div class="diag-toggles">
                <label class="toggle-control">
                    <input type="checkbox" id="toggle-bounds" checked>
                    <span>Show Bounds</span>
                </label>
                <label class="toggle-control">
                    <input type="checkbox" id="toggle-padding" checked>
                    <span>Show Padding</span>
                </label>
                <label class="toggle-control">
                    <input type="checkbox" id="toggle-gaps" checked>
                    <span>Show Gaps</span>
                </label>
                <label class="toggle-control">
                    <input type="checkbox" id="toggle-guides">
                    <span>Show Guides</span>
                </label>
            </div>
        </div>

        <div class="lab-sidebar-footer">
            <a href="../index.html" class="back-link">← Voltar ao Editor</a>
        </div>
    </nav>

    <main class="lab-content">
        <header class="lab-header glass">
            <div class="suite-info">
                <div class="badge-suite" id="suite-status-badge">PRONTO</div>
                <h2 id="active-suite-title">Selecione uma Suíte</h2>
                <p id="active-suite-desc">Ambiente isolado para testes de lógica e renderização.</p>
            </div>
            <div class="lab-actions">
                <button id="run-test" class="btn btn-primary">Rodar Teste (R)</button>
                <button id="reset-suite" class="btn btn-secondary">Resetar (Esc)</button>
            </div>
        </header>

        <div class="lab-viewport">
            <div class="canvas-container glass">
                <div class="lab-toolbar glass">
                    <button class="tool-btn active" data-tool="select" title="Selection (V)">
                        <span class="icon">🖱️</span>
                    </button>
                    <button class="tool-btn" data-tool="bezier" title="Pen Tool (P)">
                        <span class="icon">✒️</span>
                    </button>
                    <div class="tool-divider"></div>
                    <button class="tool-btn" data-tool="hand" title="Hand (H)">
                        <span class="icon">✋</span>
                    </button>
                </div>
                <div class="canvas-wrapper-inner">
                   <canvas id="lab-canvas"></canvas>
                   <div id="debug-overlay" class="debug-overlay"></div>
                </div>
            </div>

            <aside class="lab-inspector glass">
                <div class="inspector-tabs">
                    <button class="tab-btn active" data-tab="assertions">Assertions</button>
                    <button class="tab-btn" data-tab="properties">Properties</button>
                </div>
                
                <div id="inspector-content" class="inspector-body">
                    <!-- Assertions results like "Item 1 X: 120 (PASS)" -->
                    <div id="assertions-container" class="assertions-list">
                        <p class="empty-msg">Selecione um teste para carregar asserções.</p>
                    </div>
                    <div id="properties-container" class="properties-list hidden">
                        <p class="empty-msg">Nenhum elemento selecionado.</p>
                    </div>
                </div>

                <div class="inspector-terminal">
                    <div class="log-header">
                        <h4>Terminal Console</h4>
                        <button id="clear-log">CLEAR</button>
                    </div>
                    <div id="lab-log" class="log-entries"></div>
                </div>
            </aside>
        </div>
    </main>

    <!-- Lab Core -->
    <script type="module" src="LabManager.js"></script>
</body>
</html>
